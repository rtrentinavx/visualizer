<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connecting to Aviatrix…</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      color: #e2e8f0;
    }
    .card {
      max-width: 28rem;
      padding: 2rem;
      border-radius: 12px;
      background: #1e293b;
      border: 1px solid #334155;
      text-align: center;
    }
    h1 { font-size: 1rem; font-weight: 600; margin: 0 0 0.5rem; letter-spacing: 0.04em; text-transform: uppercase; color: #94a3b8; }
    p#status { margin: 0; font-size: 0.9rem; line-height: 1.5; }
    .spinner {
      width: 1.5rem;
      height: 1.5rem;
      margin: 0 auto 1rem;
      border: 2px solid #334155;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .err {
      color: #f87171;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 0.8rem;
      white-space: pre-wrap;
      text-align: left;
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.3);
      padding: 0.75rem;
      border-radius: 6px;
      margin-top: 0.75rem;
    }
    a {
      display: inline-block;
      margin-top: 1rem;
      color: #3b82f6;
      text-decoration: none;
      font-size: 0.85rem;
    }
    a:hover { text-decoration: underline; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner" id="spinner"></div>
    <h1>Aviatrix connection</h1>
    <p id="status">Completing the connection…</p>
    <div id="error" class="err" hidden></div>
    <a id="backLink" href="/" hidden>← Back to DCF Visualizer</a>
  </div>

  <script>
    /**
     * OAuth 2.0 callback handler. Reads { code, state } from the URL query,
     * pulls the matching pending-auth record from sessionStorage (written by
     * initiateConnect on the main app side before the redirect), verifies the
     * state nonce (CSRF guard), then POSTs to /api/aviatrix/oauth-token to
     * exchange the code for tokens. On success, writes a one-time handoff
     * blob to localStorage and redirects back to /. The main app's mount
     * picks up the handoff, applies the grant to the matching connection
     * (encrypted), and clears the handoff.
     *
     * No framework, no encrypted-storage helpers — those live in the React
     * bundle and we don't want to pull them in here. The handoff key is a
     * brief unencrypted window in localStorage; the main app rotates it into
     * encrypted state on next load.
     */
    (async function () {
      const PENDING_KEY = 'dcf-aviatrix-oauth-pending';
      const HANDOFF_KEY = 'dcf-aviatrix-oauth-handoff';
      const statusEl = document.getElementById('status');
      const errEl = document.getElementById('error');
      const spinnerEl = document.getElementById('spinner');
      const backLink = document.getElementById('backLink');

      function fail(msg, detail) {
        statusEl.textContent = msg;
        spinnerEl.style.display = 'none';
        if (detail) {
          errEl.textContent = String(detail);
          errEl.hidden = false;
        }
        backLink.hidden = false;
      }

      const params = new URLSearchParams(window.location.search);
      const oauthError = params.get('error');
      if (oauthError) {
        const desc = params.get('error_description');
        return fail('OAuth provider returned an error.', desc ? oauthError + ': ' + desc : oauthError);
      }
      const code = params.get('code');
      const state = params.get('state');
      if (!code || !state) {
        return fail('Missing code or state parameter in the callback URL.');
      }

      const pendingRaw = sessionStorage.getItem(PENDING_KEY);
      if (!pendingRaw) {
        return fail('No pending auth flow found in this browser session. Click Connect again from the app.');
      }
      let pending;
      try {
        pending = JSON.parse(pendingRaw);
      } catch (e) {
        sessionStorage.removeItem(PENDING_KEY);
        return fail('Pending auth record is malformed.', e && e.message);
      }
      if (pending.state !== state) {
        sessionStorage.removeItem(PENDING_KEY);
        return fail('State mismatch — possible CSRF. Aborting.');
      }
      // Consume the pending record regardless of what happens next.
      sessionStorage.removeItem(PENDING_KEY);

      // Exchange the code for tokens via our same-origin proxy.
      let tokenResp;
      try {
        const r = await fetch('/api/aviatrix/oauth-token', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            grantType: 'authorization_code',
            tokenEndpoint: pending.tokenEndpoint,
            clientId: pending.clientId,
            code: code,
            codeVerifier: pending.codeVerifier,
            redirectUri: pending.redirectUri,
          }),
        });
        if (!r.ok) {
          const errBody = await r.json().catch(function () { return {}; });
          return fail('Token exchange failed.', (errBody && errBody.error) || ('HTTP ' + r.status));
        }
        tokenResp = await r.json();
      } catch (e) {
        return fail('Could not reach the token-exchange proxy.', e && e.message);
      }

      if (!tokenResp || !tokenResp.accessToken) {
        return fail('Token endpoint returned no access token.');
      }

      // Stash for the main app to pick up.
      localStorage.setItem(HANDOFF_KEY, JSON.stringify({
        connectionId: pending.connectionId,
        accessToken: tokenResp.accessToken,
        refreshToken: tokenResp.refreshToken,
        expiresIn: tokenResp.expiresIn,
        receivedAt: Date.now(),
      }));

      statusEl.textContent = 'Connected. Redirecting…';
      // Use replace() so the back button doesn't return to this page with a stale code in the URL.
      setTimeout(function () { window.location.replace('/'); }, 350);
    })();
  </script>
</body>
</html>
