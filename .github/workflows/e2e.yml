name: E2E

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: # manual trigger from the Actions tab

# Cancel an in-flight run if a new commit lands on the same ref. Saves minutes
# on rapid pushes; the latest commit is what we care about.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Cache the Playwright browser binaries between runs. Saves ~30s/run.
      # The cache key is keyed off the @playwright/test version so a major
      # bump invalidates correctly.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      # Lint + unit tests + e2e in one job so the artifact upload below covers
      # all gates. Vitest is fast (sub-second); Playwright dominates the wall
      # clock.
      - name: Lint
        run: npm run lint

      - name: Unit / integration tests
        run: npm run test:ci

      - name: Build (Playwright runs against the built bundle)
        run: npm run build

      - name: E2E tests
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
